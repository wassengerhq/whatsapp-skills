name: Validate Agent Skills

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: skills-ref (when available)
        run: |
          # The upstream validator from https://github.com/agentskills/agentskills.
          # Once it ships on npm we'll switch to it as the source of truth.
          if command -v skills-ref >/dev/null 2>&1; then
            skills-ref validate ./skills/*
          else
            echo "skills-ref not yet on npm — running local linter only."
          fi

      - name: Lint frontmatter and structure
        run: |
          set -e
          if [ ! -d skills ]; then
            echo "No skills/ directory — nothing to validate."
            exit 0
          fi

          fail=0
          for dir in skills/*/; do
            name=$(basename "$dir")
            file="${dir}SKILL.md"

            if [ ! -f "$file" ]; then
              echo "::error file=$dir::Missing SKILL.md"
              fail=1; continue
            fi

            # name must match directory
            if ! grep -q "^name: $name$" "$file"; then
              echo "::error file=$file::name frontmatter must match directory ($name)"
              fail=1
            fi

            # name must satisfy spec regex (lowercase alnum + hyphens, no double hyphens)
            if [[ "$name" =~ -- ]] || [[ "$name" =~ ^- ]] || [[ "$name" =~ -$ ]] || [[ ! "$name" =~ ^[a-z0-9-]+$ ]]; then
              echo "::error file=$file::name '$name' violates agentskills.io naming rules"
              fail=1
            fi

            # description required and within 1024 chars
            if ! grep -q "^description:" "$file"; then
              echo "::error file=$file::Missing description: frontmatter"
              fail=1
            else
              desc_len=$(grep "^description:" "$file" | sed 's/^description: //' | wc -c | tr -d ' ')
              if [ "$desc_len" -gt 1024 ]; then
                echo "::error file=$file::description is $desc_len chars (spec max 1024)"
                fail=1
              fi
            fi

            # body length warning (spec recommends <500 lines)
            lines=$(wc -l < "$file" | tr -d ' ')
            if [ "$lines" -gt 500 ]; then
              echo "::warning file=$file::body is $lines lines (spec recommends <500; consider moving content to references/)"
            fi
          done

          if [ "$fail" -ne 0 ]; then exit 1; fi
          echo "✓ All $(ls -d skills/*/ | wc -l | tr -d ' ') skills validate."

      - name: Smoke-test CLI
        run: |
          set -e
          node --check bin/wassenger-skills.js
          node --check src/installer.js
          node --check src/api-validate.js
          node --check src/mcp-config.js
          node --check src/auto-discover.js
          node bin/wassenger-skills.js --version
          node bin/wassenger-skills.js help > /dev/null
          node bin/wassenger-skills.js list > /dev/null
          echo "✓ CLI smoke tests pass."
